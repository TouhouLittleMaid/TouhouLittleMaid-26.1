name: Gradle Package 1.21

on:
  workflow_dispatch:
  push:
    branches:
      - "1.21"
    paths:
      - 'src/main/**'
      - 'build.gradle'
      - "gradle.properties"
      - '.github/workflows/gradle-publish-1.21.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      release-tag: snapshot-${{ steps.create_timestamp.outputs.timestamp }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          # 同时运行 build 和 runGameTestServer 任务，检查服务端运行情况并打包
          ./gradlew build runGameTestServer -x test --build-cache --parallel

      - name: Rename Build Artifacts
        run: |
          cd ./build/libs/
          # 找到以 -all.jar 结尾的文件，将其更名为包含 snapshot 的名称
          for f in *-all.jar; do
            mv "$f" "${f%-all.jar}-snapshot.jar"
          done
          # 查看一下结果，方便在日志里调试
          ls -R

      - name: Create timestamp
        id: create_timestamp
        run: echo "timestamp=$(date '+%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Send file to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: snapshot-${{ steps.create_timestamp.outputs.timestamp }}
          generate_release_notes: true
          body: |
            > ### 📢 Notice / 提示
            > - **EN:** Files ending in `-sources` are source code. Please download the version ending in `-snapshot`.
            > - **CN:** 结尾为 `-sources` 的是源码文件；**请下载结尾为 `-snapshot` 的版本**。
            
            ${{ github.event.head_commit.message }}

          draft: false
          prerelease: true
          files: |
            build/libs/*-snapshot.jar
            build/libs/*-sources.jar

  # ==========================================================
  # 服务端冒烟测试：在 build 完成后独立运行，失败不影响构建发布
  # ==========================================================
  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    # 此任务失败不影响整体 workflow 状态
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Download mod jar from release
        run: gh release download "${{ needs.build.outputs.release-tag }}" --pattern "*-snapshot.jar" --dir run/mods
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download dependency mods from Modrinth
        run: python3 .github/script/download_modrinth_mod.py

      - name: Server smoke test
        uses: headlesshq/mc-server-test@1.1.1
        with:
          mc: '1.21.1'
          modloader: neoforge
          java: 21

