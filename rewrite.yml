---
type: specs.openrewrite.org/v1beta/recipe
name: com.github.tartaricacid.Upgrade
recipeList:
  - org.openrewrite.java.ChangePackage:
      oldPackageName: net.minecraft.advancements.criterion
      newPackageName: net.minecraft.advancements.triggers
      recursive: true

  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: net.minecraft.advancements.triggers.ContextAwarePredicate
      newFullyQualifiedTypeName: net.minecraft.advancements.predicates.ContextAwarePredicate

  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: net.minecraft.advancements.triggers.EntityPredicate
      newFullyQualifiedTypeName: net.minecraft.advancements.predicates.entity.EntityPredicate

  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: net.minecraft.advancements.triggers.ItemPredicate
      newFullyQualifiedTypeName: net.minecraft.advancements.predicates.ItemPredicate

  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: net.minecraft.advancements.triggers.FishingHookPredicate
      newFullyQualifiedTypeName: net.minecraft.advancements.predicates.entity.FishingHookPredicate

  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: net.minecraft.advancements.Criterion
      newFullyQualifiedTypeName: net.minecraft.advancements.triggers.Criterion

  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: net.minecraft.advancements.CriterionTrigger
      newFullyQualifiedTypeName: net.minecraft.advancements.triggers.CriterionTrigger

  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: net.minecraft.world.entity.monster.Slime
      newFullyQualifiedTypeName: net.minecraft.world.entity.monster.cubemob.Slime

  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: net.minecraft.data.tags.KeyTagProvider
      newFullyQualifiedTypeName: net.minecraft.data.tags.TagsProvider

  - org.openrewrite.java.ChangeMethodName:
      methodPattern: com.mojang.blaze3d.systems.RenderSystem getModelViewMatrix()
      newMethodName: getModelViewMatrixCopy

  - org.openrewrite.java.ChangeMethodName:
      methodPattern: net.minecraft.client.renderer.GameRenderer getMainCamera()
      newMethodName: mainCamera

  - org.openrewrite.java.ChangeMethodName:
      methodPattern: net.minecraft.client.renderer.GameRenderer getGameRenderState()
      newMethodName: gameRenderState

  - org.openrewrite.text.FindAndReplace:
      find: Blocks.RED_WOOL
      replace: Blocks.WOOL.red()
      filePattern: "**/*.java"

  - org.openrewrite.text.FindAndReplace:
      find: Blocks.RED_CONCRETE
      replace: Blocks.CONCRETE.red()
      filePattern: "**/*.java"

  - org.openrewrite.text.FindAndReplace:
      find: Items.GRAY_WOOL
